version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  commands:
    - asdf plugin add uv
    - asdf install uv latest
    - asdf global uv latest
    - uv sync --group doc
    - mkdir -p $READTHEDOCS_OUTPUT/html/
    - uv run mkdocs build -d $READTHEDOCS_OUTPUT/html/

mkdocs:
  configuration: mkdocs.yml
