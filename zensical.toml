[project]
site_name = "Jim"
site_url = "https://gw-jax-team.github.io/jim/"
site_description = "A JAX-based gravitational-wave inference toolkit"
site_author = "GW JAX Team"
repo_url = "https://github.com/GW-JAX-Team/jim"
repo_name = "GW-JAX-Team/jim"

extra_javascript = [
    "javascripts/mathjax.js",
    "https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js",
]

nav = [
    {"Home" = "index.md"},
    {"Installation" = "installation.md"},
    {"Quick Start" = "quickstart.md"},
    {"Tutorials" = [
        "tutorials/index.md",
        {"Getting Started" = "tutorials/getting_started.md"},
        {"Data" = "tutorials/data.md"},
        {"Likelihood" = "tutorials/likelihood.md"},
        {"Prior" = "tutorials/prior.md"},
        {"Samplers" = "tutorials/samplers.md"},
        {"Transforms" = "tutorials/transforms.md"},
    ]},
    {"FAQ" = "FAQ.md"},
    {"Contributing" = "contributing.md"},
    # API section is auto-generated by docs/gen_api.py at build time
]

[project.extra.version]
provider = "mike"
default = "stable"

[project.theme]
variant = "modern"
features = [
    "navigation.instant",
    "navigation.tabs",
    "navigation.top",
    "toc.follow",
    "header.autohide",
]
palette = [
    {scheme = "slate", toggle = {icon = "material/brightness-4", name = "Switch to light mode"}},
    {scheme = "default", toggle = {icon = "material/brightness-7", name = "Switch to dark mode"}},
]

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.admonition]

[project.markdown_extensions.toc]
permalink = "¤"
toc_depth = 4

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
filters = ["!^logger$"]
inherited_members = true
show_root_heading = true
show_root_full_path = true
show_if_no_docstring = true
show_signature_annotations = true
show_source = false
members_order = "source"
heading_level = 3
